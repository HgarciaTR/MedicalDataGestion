<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Medical Data Gestión</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>


<div class="login-container">

    <img src="img/logo.png" alt="Medical Data Gestión" class="logo">

    <h1>Medical Data Gestión</h1>

    <p class="descripcion">

        Sistema web para la gestión de medicamentos e inventario hospitalario.

    </p>

    <form>

        <label for="correo">

            Correo electrónico

        </label>

        <input
        type="email"
        id="correo"
        placeholder="Ingrese su correo">

        <label for="password">

            Contraseña

        </label>

        <input
        type="password"
        id="password"
        placeholder="Ingrese su contraseña">

        <button
        type="button"
        onclick="iniciarSesion()">

            Ingresar al sistema

        </button>

    </form>

    <footer>

        © 2026 Medical Data Gestión

    </footer>

</div>

<script src="js/script.js"></script>

</body>

</html>
